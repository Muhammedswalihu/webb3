<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background square -->
  <rect width="100" height="100" fill="#0a0e1a"/>
  
  <!-- Outer diamond ring -->
  <polygon points="50,8 92,50 50,92 8,50" fill="none" stroke="#c8972a" stroke-width="3" opacity="0.4"/>
  
  <!-- North arrow (gold - pointing up-right) -->
  <polygon points="50,18 62,50 50,44 38,50" fill="#c8972a"/>
  
  <!-- South arrow (muted - pointing down-left) -->
  <polygon points="50,82 38,50 50,56 62,50" fill="rgba(200,151,42,0.25)"/>
  
  <!-- Center circle -->
  <circle cx="50" cy="50" r="5" fill="white"/>
  
  <!-- Small tick marks -->
  <line x1="50" y1="8" x2="50" y2="14" stroke="#c8972a" stroke-width="2.5" opacity="0.6"/>
  <line x1="92" y1="50" x2="86" y2="50" stroke="#c8972a" stroke-width="2.5" opacity="0.6"/>
  <line x1="50" y1="92" x2="50" y2="86" stroke="#c8972a" stroke-width="2.5" opacity="0.6"/>
  <line x1="8" y1="50" x2="14" y2="50" stroke="#c8972a" stroke-width="2.5" opacity="0.6"/>
</svg>
